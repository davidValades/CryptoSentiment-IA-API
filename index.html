<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoSentiment AI Oracle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Transición suave para el gráfico circular */
      .circle-transition {
        transition: stroke-dasharray 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* Barra de carga animada de fondo */
      .loading-bar {
        background-size: 200% 100%;
        animation: gradientMove 2s infinite linear;
        background-image: linear-gradient(
          90deg,
          #1f2937 0%,
          #3b82f6 50%,
          #1f2937 100%
        );
      }
      @keyframes gradientMove {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }
    </style>
  </head>
  <div
    id="settings-modal"
    class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50"
  >
    <div
      class="bg-gray-800 p-6 rounded-2xl border border-gray-600 w-full max-w-lg shadow-2xl"
    >
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-white">⚙️ Fuentes RSS de Noticias</h2>
        <button
          onclick="toggleSettings()"
          class="text-gray-400 hover:text-white font-bold text-xl"
        >
          &times;
        </button>
      </div>

      <ul
        id="sources-list"
        class="space-y-3 mb-6 max-h-60 overflow-y-auto"
      ></ul>

      <div class="flex gap-2">
        <input
          type="url"
          id="new-source-url"
          placeholder="https://ejemplo.com/rss"
          class="flex-1 bg-gray-900 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500"
        />
        <button
          onclick="addSource()"
          class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg font-bold text-white transition"
        >
          Añadir
        </button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById("settings-modal");
    const sourcesList = document.getElementById("sources-list");

    function toggleSettings() {
      modal.classList.toggle("hidden");
      if (!modal.classList.contains("hidden")) {
        loadSources();
      }
    }

    async function loadSources() {
      sourcesList.innerHTML =
        '<li class="text-gray-400 text-center">Cargando fuentes...</li>';
      const res = await fetch("/api/v1/sources");
      const data = await res.json();

      sourcesList.innerHTML = "";
      data.sources.forEach((url) => {
        sourcesList.innerHTML += `
                    <li class="flex justify-between items-center bg-gray-900 p-3 rounded-lg border border-gray-700">
                        <span class="text-sm text-gray-300 truncate mr-4">${url}</span>
                        <button onclick="deleteSource('${url}')" class="text-red-400 hover:text-red-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </li>
                `;
      });
    }

    async function addSource() {
      const input = document.getElementById("new-source-url");
      if (!input.value) return;

      await fetch("/api/v1/sources", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: input.value }),
      });
      input.value = "";
      loadSources();
    }

    async function deleteSource(url) {
      await fetch("/api/v1/sources", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: url }),
      });
      loadSources();
    }
  </script>
  <body
    class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center py-12"
  >
    <div class="max-w-2xl w-full px-6">
      <div class="text-center mb-10 relative">
        <button
          onclick="toggleSettings()"
          class="absolute right-0 top-0 mt-2 mr-2 text-gray-400 hover:text-white transition"
        >
          <svg
            class="w-7 h-7"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
            ></path>
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            ></path>
          </svg>
        </button>
        <h1
          class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2"
        >
          🔮 CryptoSentiment Oracle
        </h1>
        <p class="text-gray-400">
          Inteligencia Artificial para mercados volátiles
        </p>
      </div>

      <div
        class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 mb-8"
      >
        <form id="analyze-form" class="flex gap-4">
          <input
            type="text"
            id="ticker-input"
            placeholder="Ej. BTC, ETH, RON"
            required
            autocomplete="off"
            class="flex-1 bg-gray-900 text-white px-5 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 uppercase placeholder-gray-500 transition-colors"
          />
          <button
            type="submit"
            id="submit-btn"
            class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl transition-all duration-200 shadow-lg shadow-blue-500/30"
          >
            Analizar
          </button>
        </form>
      </div>

      <div
        id="loading-state"
        class="hidden bg-gray-800 rounded-2xl p-8 border border-gray-700 text-center shadow-xl"
      >
        <div class="h-2 w-full bg-gray-700 rounded-full overflow-hidden mb-6">
          <div class="h-full loading-bar w-full"></div>
        </div>
        <p
          id="loading-text"
          class="text-blue-400 font-medium text-lg animate-pulse"
        >
          Iniciando protocolo...
        </p>
        <p class="text-gray-500 text-sm mt-2">
          Este proceso toma aprox. 5-8 segundos
        </p>
      </div>

      <div
        id="result-card"
        class="hidden bg-gray-800 rounded-2xl shadow-xl border border-gray-700 overflow-hidden"
      >
        <div
          class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-800/80"
        >
          <div class="flex items-center gap-3">
            <h2 class="text-3xl font-black tracking-tight" id="res-ticker">
              BTC
            </h2>
            <span class="text-gray-500 font-medium">/ USDT</span>
          </div>
          <span
            id="res-badge"
            class="px-5 py-2 rounded-lg text-sm font-bold uppercase tracking-widest shadow-inner"
          >
          </span>
        </div>

        <div class="p-6 flex flex-col md:flex-row gap-8 items-center">
          <div class="relative w-40 h-40 flex-shrink-0">
            <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
              <path
                class="text-gray-700"
                stroke-width="3"
                stroke="currentColor"
                fill="none"
                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
              />
              <path
                id="gauge-fill"
                class="circle-transition text-gray-500"
                stroke-dasharray="0, 100"
                stroke-width="3"
                stroke-linecap="round"
                stroke="currentColor"
                fill="none"
                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
              />
            </svg>
            <div
              class="absolute inset-0 flex flex-col items-center justify-center"
            >
              <span id="res-score" class="text-5xl font-black">0</span>
              <span class="text-gray-500 text-xs font-bold uppercase mt-1"
                >Score</span
              >
            </div>
          </div>

          <div
            class="flex-1 bg-gray-900 rounded-xl p-5 border border-gray-700 w-full shadow-inner"
          >
            <h3
              class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2"
            >
              <span
                class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"
              ></span>
              Análisis de Gemini AI
            </h3>
            <ul
              id="res-summary"
              class="space-y-4 text-gray-300 text-sm md:text-base leading-relaxed list-none"
            ></ul>
          </div>
        </div>
      </div>

      <div
        id="error-card"
        class="hidden bg-red-900/20 border border-red-500/50 rounded-xl p-6 text-center mt-6"
      >
        <p id="error-message" class="text-red-400 font-medium"></p>
      </div>
    </div>

    <script>
      const loadingTexts = [
        "Conectando con Binance API...",
        "Descargando datos de Precio y Volumen...",
        "Buscando últimas noticias en la red...",
        "Procesando contexto con modelo Gemini 3.1...",
        "Generando veredicto final...",
      ];

      document
        .getElementById("analyze-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const ticker = document
            .getElementById("ticker-input")
            .value.trim()
            .toUpperCase();
          if (!ticker) return;

          // Variables de UI
          const btn = document.getElementById("submit-btn");
          const loadingState = document.getElementById("loading-state");
          const resultCard = document.getElementById("result-card");
          const errorCard = document.getElementById("error-card");
          const loadingTextEl = document.getElementById("loading-text");
          const gaugeFill = document.getElementById("gauge-fill");

          // Preparar UI para la carga
          btn.disabled = true;
          btn.classList.add("opacity-50", "cursor-not-allowed");
          resultCard.classList.add("hidden");
          errorCard.classList.add("hidden");
          loadingState.classList.remove("hidden");
          gaugeFill.setAttribute("stroke-dasharray", `0, 100`); // Reset gráfico

          // Lógica del "Smart Loader"
          let textIndex = 0;
          loadingTextEl.textContent = loadingTexts[textIndex];
          const textInterval = setInterval(() => {
            textIndex++;
            if (textIndex < loadingTexts.length) {
              loadingTextEl.textContent = loadingTexts[textIndex];
            }
          }, 1200); // Cambia el texto cada 1.2 segundos

          try {
            // Llamada real al Oráculo (Tu API FastAPI)
            const response = await fetch(`/api/v1/analyze/${ticker}`);
            const data = await response.json();

            if (!response.ok) {
              throw new Error(
                data.detail || "Error desconocido procesando la solicitud.",
              );
            }

            clearInterval(textInterval); // Parar los textos

            // ====== RELLENAR DATOS ======
            document.getElementById("res-ticker").textContent = data.ticker;

            // Animación del número (Score)
            let currentScore = 0;
            const scoreInterval = setInterval(() => {
              if (currentScore >= data.score) {
                clearInterval(scoreInterval);
                document.getElementById("res-score").textContent = data.score;
              } else {
                currentScore++;
                document.getElementById("res-score").textContent = currentScore;
              }
            }, 15); // Velocidad del contador

            // Lógica de Colores según Sentimiento
            const badge = document.getElementById("res-badge");
            badge.textContent = data.sentiment;
            badge.className =
              "px-5 py-2 rounded-lg text-sm font-bold uppercase tracking-widest shadow-inner ";
            gaugeFill.classList.remove(
              "text-green-500",
              "text-red-500",
              "text-gray-500",
            );

            if (data.sentiment === "Bullish") {
              badge.classList.add(
                "bg-green-500/20",
                "text-green-400",
                "border",
                "border-green-500/30",
              );
              gaugeFill.classList.add("text-green-500");
              document.getElementById("res-score").className =
                "text-5xl font-black text-green-400";
            } else if (data.sentiment === "Bearish") {
              badge.classList.add(
                "bg-red-500/20",
                "text-red-400",
                "border",
                "border-red-500/30",
              );
              gaugeFill.classList.add("text-red-500");
              document.getElementById("res-score").className =
                "text-5xl font-black text-red-400";
            } else {
              badge.classList.add(
                "bg-gray-500/20",
                "text-gray-400",
                "border",
                "border-gray-500/30",
              );
              gaugeFill.classList.add("text-gray-400");
              document.getElementById("res-score").className =
                "text-5xl font-black text-white";
            }

            // Animar el Gráfico Circular con un pequeño delay para mejor efecto visual
            setTimeout(() => {
              gaugeFill.setAttribute("stroke-dasharray", `${data.score}, 100`);
            }, 100);

            // Formatear y mostrar el resumen
            const summaryList = document.getElementById("res-summary");
            summaryList.innerHTML = "";
            const lines = data.summary
              .split("\n")
              .filter((line) => line.trim() !== "");
            lines.forEach((line) => {
              const li = document.createElement("li");
              li.className = "flex items-start gap-3";
              li.innerHTML = `<span class="text-blue-500 mt-1">▶</span> <p>${line.replace(/^(?:-\s*|\d+\.\s*)/, "").trim()}</p>`;
              summaryList.appendChild(li);
            });

            // Mostrar resultados
            loadingState.classList.add("hidden");
            resultCard.classList.remove("hidden");
          } catch (error) {
            clearInterval(textInterval);
            loadingState.classList.add("hidden");
            document.getElementById("error-message").textContent =
              error.message;
            errorCard.classList.remove("hidden");
          } finally {
            btn.disabled = false;
            btn.classList.remove("opacity-50", "cursor-not-allowed");
          }
        });
    </script>
  </body>
</html>
